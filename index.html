<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Industria de la Piedra</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --blanco-crema: #FDFBF7;
      --negro: #1A1A1A;
      --dorado: #D4AF37;
      --verde-esmeralda: #046307;
    }
    body { 
      background-color: var(--blanco-crema); 
      color: var(--negro); 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      padding: 30px; 
      margin: 0;
    }
    .header { 
      border-bottom: 3px solid var(--dorado); 
      padding-bottom: 20px; 
      margin-bottom: 30px; 
    }
    h1 { 
      color: var(--verde-esmeralda); 
      margin: 0; 
      font-size: 2.2em;
    }
    p {
      font-size: 1.1em;
      font-weight: 500;
    }
    .grid-kpis { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
      gap: 20px; 
      margin-bottom: 30px; 
    }
    .card { 
      background: white; 
      border-left: 5px solid var(--dorado); 
      padding: 20px; 
      border-radius: 8px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
    }
    .card h3 { 
      color: var(--verde-esmeralda); 
      margin: 0 0 10px 0; 
      font-size: 0.9em; 
      text-transform: uppercase; 
    }
    .valor { 
      font-size: 1.8em; 
      font-weight: bold; 
    }
    .graficos { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
      gap: 30px; 
    }
    .chart-box { 
      background: white; 
      padding: 20px; 
      border-radius: 8px; 
      border-top: 4px solid var(--verde-esmeralda); 
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Transformación de Superficies</h1>
    <p>Monitoreo de Mercado y Benchmarks (2025-2026)</p>
  </div>

  <div class="grid-kpis" id="kpis">
    <!-- El contenedor de KPIs se alimenta dinámicamente desde el backend -->
  </div>

  <div class="graficos">
    <div class="chart-box">
      <h3>Inversión vs Ingresos (USD)</h3>
      <canvas id="chart1"></canvas>
    </div>
    <div class="chart-box">
      <h3>Cuota de Mercado: Granito vs Otras Superficies</h3>
      <canvas id="chart2"></canvas>
    </div>
  </div>

  <script>
    // Enlace de tu backend en Render ejecutando Python
    const URL_BACKEND = "https://dashboard-marmol.onrender.com/api/benchmarks";

    async function cargarDashboard() {
      try {
        const respuesta = await fetch(URL_BACKEND);
        
        // Verificación de integridad de la respuesta HTTP
        if (!respuesta.ok) {
          throw new Error(`Error HTTP: ${respuesta.status}`);
        }
        
        const datos = await respuesta.json();
        
        // 1. Renderizado de KPIs en pantalla
        const contenedor = document.getElementById('kpis');
        const metricasClave = ['Tamaño del Mercado', 'Margen Bruto', 'Overhead por SqFt'];
        
        datos.forEach(item => {
          if(metricasClave.includes(item.Métrica)) {
            contenedor.innerHTML += `
              <div class="card">
                <h3>${item.Métrica}</h3>
                <div class="valor">${item.Valor_Maximo} <span style="font-size:0.5em; color:#666;">${item.Unidad}</span></div>
              </div>`;
          }
        });

        // 2. Gráfico de Barras: Métricas Financieras
        const ingresoMax = datos.find(d => d.Métrica === 'Ingreso Anual Promedio').Valor_Maximo;
        const capex = datos.find(d => d.Métrica === 'Inversión Inicial (CapEx)').Valor_Maximo;
        
        new Chart(document.getElementById('chart1'), {
          type: 'bar',
          data: {
            labels: ['Ingreso Máximo Potencial', 'CapEx Inicial Maquinaria'],
            datasets: [{
              data: [ingresoMax, capex],
              backgroundColor: ['#046307', '#1A1A1A'],
              borderRadius: 4
            }]
          },
          options: { 
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
          }
        });

        // 3. Gráfico Doughnut: Participación de Materiales
        const granito = datos.find(d => d.Métrica === 'Granito (Cuota)').Valor_Maximo;
        new Chart(document.getElementById('chart2'), {
          type: 'doughnut',
          data: {
            labels: ['Granito', 'Otras Superficies'],
            datasets: [{ 
              data: [granito, 100 - granito], 
              backgroundColor: ['#D4AF37', '#1A1A1A'],
              borderColor: '#FDFBF7',
              borderWidth: 3
            }]
          },
          options: {
            responsive: true,
            cutout: '65%',
            plugins: {
              legend: { position: 'bottom' }
            }
          }
        });

      } catch (error) {
        console.error("Fallo de conexión con la API:", error);
      }
    }
    
    // Inicialización del despliegue
    cargarDashboard();
  </script>
</body>
</html>
