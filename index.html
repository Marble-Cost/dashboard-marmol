<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benchmarks de Industrias · Observatorio de Mercados</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --blanco-crema: #FDFBF7;
      --negro: #09090B; /* Shadcn zinc-950 */
      --dorado: #D4AF37;
      --verde-esmeralda: #046307;
      
      /* Glassmorphism y Shadcn Aesthetics */
      --vidrio-fondo: rgba(255, 255, 255, 0.7);
      --vidrio-desenfoque: blur(24px) saturate(150%);
      --vidrio-borde: rgba(255, 255, 255, 0.9);
      --vidrio-reflejo: inset 0 1px 1px rgba(255, 255, 255, 1), inset 0 -1px 1px rgba(0,0,0,0.02);
      
      --sombra-shadcn: 0 1px 3px rgba(0,0,0,0.05), 0 10px 15px -5px rgba(0,0,0,0.03);
      --sombra-elevada: 0 20px 25px -5px rgba(4, 99, 7, 0.1), 0 8px 10px -6px rgba(4, 99, 7, 0.1);
      
      /* Curvas de animación (Framer Motion replica) */
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.15);
      --transicion: 0.4s var(--ease-out-quart);
    }

    * { box-sizing: border-box; }

    body {
      background-color: var(--blanco-crema);
      color: var(--negro);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: clamp(16px, 3vw, 40px);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== Luz de Cursor Inmersiva ===== */
    .cursor-glow {
      position: fixed;
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 60%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: opacity 0.5s ease;
      opacity: 0;
      mix-blend-mode: multiply;
    }

    /* ===== Layout Central Optimizado ===== */
    .layout-central {
      max-width: 1500px; /* Expandido para aprovechar pantallas anchas */
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ===== Scrollbar Minimalista ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.6); }

    /* ===== Fondo Dinámico ===== */
    .fondo-animado { position: fixed; inset: 0; z-index: -1; background: var(--blanco-crema); overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3; animation: flotar 25s infinite ease-in-out alternate; }
    .orb-1 { width: 45vw; height: 45vw; background: var(--dorado); top: -10%; left: -10%; }
    .orb-2 { width: 50vw; height: 50vw; background: var(--verde-esmeralda); bottom: -10%; right: -10%; animation-delay: -5s; }
    @keyframes flotar { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }
    
    body::before {
      content: ''; position: fixed; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--dorado) 0%, #F3E5B0 50%, var(--verde-esmeralda) 100%);
      z-index: 100;
    }

    /* ===== Cabecera Flex (Aprovechamiento de espacio) ===== */
    .header-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .header-izq { flex: 1; }
    .header-der { display: flex; align-items: flex-end; }
    
    .eyebrow {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--dorado); margin: 0 0 10px 0; display: inline-block;
      padding: 4px 12px; background: rgba(212, 175, 55, 0.08); border-radius: 12px;
      border: 1px solid rgba(212, 175, 55, 0.2);
    }
    h1 {
      font-family: 'Marcellus', serif; margin: 0; font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1.1; color: var(--verde-esmeralda); letter-spacing: -0.5px;
    }
    .header-izq p {
      font-size: 1.05rem; color: #52525B; margin: 8px 0 0 0; max-width: 500px;
    }

    /* ===== Selector de industria (Botones Shadcn style) ===== */
    .selector-industria {
      display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .ind-chip {
      flex: 0 0 auto; display: flex; align-items: center; gap: 8px;
      background: white; border: 1px solid rgba(0,0,0,0.08); border-radius: 12px;
      padding: 10px 18px; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 500;
      color: #3F3F46; cursor: pointer; transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }
    .ind-chip:hover { background: #F4F4F5; color: var(--negro); transform: translateY(-1px); }
    .ind-chip:active { transform: scale(0.97); }
    .ind-chip.activo {
      background: var(--verde-esmeralda); border-color: var(--verde-esmeralda);
      color: white; box-shadow: 0 4px 12px rgba(4, 99, 7, 0.2); font-weight: 600;
    }

    @media (min-width: 1024px) {
      .header-wrapper { flex-direction: row; justify-content: space-between; align-items: flex-end; }
      .selector-industria { justify-content: flex-end; }
    }

    /* ===== Animaciones Maestras (Shadcn Blur-Fade) ===== */
    .anim-blur-fade {
      opacity: 0; filter: blur(10px); transform: translateY(15px) scale(0.98);
      animation: blurFadeIn 0.6s var(--ease-out-quart) forwards;
    }
    @keyframes blurFadeIn {
      100% { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); }
    }
    /* Retrasos escalonados */
    .d-1 { animation-delay: 0.05s; }
    .d-2 { animation-delay: 0.1s; }
    .d-3 { animation-delay: 0.15s; }
    .d-4 { animation-delay: 0.2s; }

    .transicion-contenido {
      transition: opacity 0.3s ease, transform 0.3s var(--ease-out-quart);
      opacity: 1; transform: translateY(0);
    }
    .transicion-contenido.oculto { opacity: 0; transform: translateY(10px); pointer-events: none; }

    /* ===== Grid Superior: Veredicto + KPIs ===== */
    .grid-superior {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }
    @media (min-width: 1024px) {
      .grid-superior { grid-template-columns: 1.1fr 2fr; }
    }

    /* Veredicto */
    .veredicto {
      background: linear-gradient(135deg, rgba(6, 61, 8, 0.95), rgba(4, 99, 7, 0.85));
      -webkit-backdrop-filter: var(--vidrio-desenfoque); backdrop-filter: var(--vidrio-desenfoque);
      border: 1px solid rgba(255, 255, 255, 0.15); color: white; border-radius: 20px;
      padding: 32px; box-shadow: var(--sombra-elevada), inset 0 1px 1px rgba(255,255,255,0.1);
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .veredicto h2 { font-family: 'Marcellus', serif; font-size: 1.5rem; margin: 0 0 16px 0; color: #F3E5B0; }
    .veredicto p { margin: 0 0 24px 0; font-size: 1rem; line-height: 1.6; color: #E4E4E7; }
    .senales { display: flex; flex-wrap: wrap; gap: 8px; }
    .senal {
      background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px; padding: 6px 14px; font-size: 0.8rem; font-weight: 500;
    }

    /* KPIs */
    .grid-kpis {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;
    }
    .card {
      background: var(--vidrio-fondo); -webkit-backdrop-filter: var(--vidrio-desenfoque); backdrop-filter: var(--vidrio-desenfoque);
      border: 1px solid var(--vidrio-borde); padding: 24px; border-radius: 20px;
      box-shadow: var(--sombra-shadcn), var(--vidrio-reflejo); transition: all var(--transicion);
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--sombra-elevada), var(--vidrio-reflejo); border-color: rgba(212, 175, 55, 0.4); }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .card h3 { color: #52525B; margin: 0; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(212, 175, 55, 0.15); display: flex; align-items: center; justify-content: center; color: var(--dorado); font-size: 1.2rem; }
    .valor { font-size: 2.2rem; font-weight: 700; color: var(--negro); letter-spacing: -1px; line-height: 1; margin-bottom: 8px; }
    .valor .unidad { font-size: 0.4em; font-weight: 600; color: #71717A; margin-left: 4px; text-transform: uppercase; }
    .contexto { font-size: 0.85rem; color: #71717A; line-height: 1.5; margin: 0; }

    /* ===== Filtros ===== */
    .filtros {
      display: flex; gap: 8px; overflow-x: auto; padding: 4px; margin-bottom: 24px;
      -webkit-overflow-scrolling: touch;
    }
    .chip {
      flex: 0 0 auto; background: white; border: 1px solid rgba(0,0,0,0.08); border-radius: 8px;
      padding: 8px 16px; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500;
      color: #52525B; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }
    .chip:hover { background: #F4F4F5; color: var(--negro); }
    .chip.activo { background: var(--negro); border-color: var(--negro); color: white; font-weight: 600; }

    /* ===== Gráficos ===== */
    .graficos {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 400px), 1fr)); gap: 24px;
    }
    .panel {
      background: var(--vidrio-fondo); -webkit-backdrop-filter: var(--vidrio-desenfoque); backdrop-filter: var(--vidrio-desenfoque);
      border: 1px solid var(--vidrio-borde); padding: 24px; border-radius: 20px;
      box-shadow: var(--sombra-shadcn), var(--vidrio-reflejo); transition: all var(--transicion);
      display: flex; flex-direction: column;
    }
    .panel:hover { box-shadow: var(--sombra-elevada), var(--vidrio-reflejo); }
    .panel.oculto { display: none; }
    
    .panel-header { margin-bottom: 20px; }
    .panel h3 { font-family: 'Marcellus', serif; font-size: 1.3rem; margin: 0 0 4px 0; color: var(--negro); }
    .cat-tag { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--verde-esmeralda); margin: 0; }
    .panel canvas { max-height: 280px; width: 100% !important; margin-bottom: 24px; margin-top: auto;}

    .insight {
      background: #F4F4F5; border: 1px solid #E4E4E7; border-left: 3px solid var(--dorado);
      border-radius: 12px; padding: 16px; font-size: 0.9rem; line-height: 1.6; color: #3F3F46;
      margin-top: auto;
    }
    .insight strong { color: var(--negro); font-weight: 600; }

    /* ===== Esqueletos (Shadcn UI Style) ===== */
    .skeleton {
      background: rgba(0,0,0,0.05);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
    }
    .skeleton::after {
      content: ''; position: absolute; inset: 0; transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      animation: shadcn-shimmer 2s infinite;
    }
    @keyframes shadcn-shimmer { 100% { transform: translateX(100%); } }

    .aviso-espera {
      display: none; padding: 16px; background: rgba(212, 175, 55, 0.1); border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 12px; font-size: 0.9rem; font-weight: 500; text-align: center; margin-bottom: 24px;
    }
    .aviso-espera.visible { display: block; animation: blurFadeIn 0.4s ease forwards; }

    .error-box { display: none; background: white; border: 1px solid #E4E4E7; border-left: 4px solid #EF4444; border-radius: 12px; padding: 20px; margin-bottom: 24px; box-shadow: var(--sombra-shadcn); }
    .error-box.visible { display: block; }
    .error-box h3 { margin: 0 0 8px 0; color: #EF4444; font-size: 1rem; }
    
    @media (max-width: 768px) {
      .header-wrapper { text-align: center; align-items: center; }
      .selector-industria { justify-content: center; }
    }
    @media (max-width: 520px) {
      .filtros { justify-content: flex-start; }
      .cursor-glow { display: none; }
      .veredicto { padding: 24px; }
    }
  </style>
</head>
<body>

  <div class="cursor-glow" id="cursorGlow"></div>
  <div class="fondo-animado"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

  <main class="layout-central">
    
    <div class="header-wrapper">
      <div class="header-izq anim-blur-fade">
        <span class="eyebrow">Business Intelligence</span>
        <h1 id="tituloIndustria">Benchmarks de Industrias</h1>
        <p>Análisis de rentabilidad y viabilidad operativa.</p>
      </div>
      <div class="header-der anim-blur-fade d-1">
        <nav class="selector-industria" id="selectorIndustria"></nav>
      </div>
    </div>

    <div class="aviso-espera" id="avisoEspera">⏳ Conectando al motor de datos... (puede tardar unos segundos)</div>
    <div class="error-box" id="errorBox">
      <h3>Error de conexión</h3>
      <p id="errorDetalle"></p>
      <button class="chip activo" onclick="cargarDashboard()">Reintentar</button>
    </div>

    <div id="contenido" class="transicion-contenido">
      <!-- Loading Skeleton Layout -->
      <div class="grid-superior">
        <div class="skeleton" style="height: 300px;"></div>
        <div class="grid-kpis">
          <div class="skeleton" style="height: 160px;"></div><div class="skeleton"></div><div class="skeleton"></div>
        </div>
      </div>
      <div class="graficos">
        <div class="skeleton" style="height: 400px;"></div><div class="skeleton"></div>
      </div>
    </div>

  </main>

  <script>
    const URL_BACKEND = "https://dashboard-marmol.onrender.com/api/benchmarks";
    let timerAviso = null, charts = [], datosGlobales = [], industriaActiva = null;

    // --- Cursor Inmersivo ---
    const cursor = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', (e) => {
      cursor.style.opacity = '1'; cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
    });
    document.addEventListener('mouseleave', () => cursor.style.opacity = '0');

    // --- Utilidades ---
    const fmt = (n, dec = 0) => Number(n).toLocaleString('es-CO', { minimumFractionDigits: dec, maximumFractionDigits: dec });
    const M = (nombre) => datosGlobales.find(d => (d['Industria'] ?? 'Piedra y Superficies') === industriaActiva && d['Métrica'] === nombre) ?? null;
    const tooltipBase = { backgroundColor: '#09090B', padding: 12, cornerRadius: 8, titleFont: {family: 'Inter', size: 13, weight: '600'}, bodyFont: {family: 'Inter', size: 13} };

    // =========================================================
    //   CONFIGURACIÓN EDITORIAL
    // =========================================================
    const CONFIG = {
      'Piedra y Superficies': {
        emoji: '🪨',
        veredicto: {
          titulo: 'Atractivo, pero exigente',
          texto: () => `Mercado de <strong>US$ ${M('Tamaño del Mercado') ? fmt(M('Tamaño del Mercado').Valor_Maximo, 1) : '—'}B</strong> que crece <strong>${M('Crecimiento (CAGR)') ? fmt(M('Crecimiento (CAGR)').Valor_Maximo, 1) : '—'}% al año</strong>. Altamente lucrativo, pero la barrera de inversión inicial y la eficiencia operativa son implacables.`,
          senales: ['✅ Alta demanda', '✅ Márgenes brutos fuertes', '⚠️ CapEx elevado', '⚠️ Dependencia del CNC']
        },
        kpis: [
          { met: 'Tamaño del Mercado', label: 'Mercado Total', unidad: 'Billones USD', dec: 1, ctx: 'Ventas mundiales anuales.' },
          { met: 'Margen Bruto', label: 'Margen Bruto', unidad: '% Max', dec: 0, ctx: 'Ganancia antes de impuestos.' },
          { met: 'Overhead por SqFt', label: 'Overhead', unidad: 'USD/SqFt', dec: 0, ctx: 'Costo fijo por pie cuadrado.' }
        ],
        graficos: [
          {
            cat: 'financiero', catLabel: 'Métricas Financieras', titulo: 'Rendimiento de Facturación',
            tipo: 'minmax', mets: ['Ingreso Anual Promedio'], labels: ['Facturación (USD)'],
            insight: () => { const m = M('Ingreso Anual Promedio'); return m ? `Un taller promedio factura entre <strong>US$ ${fmt(m.Valor_Minimo)}</strong> y <strong>US$ ${fmt(m.Valor_Maximo)}</strong> al año. La gestión de datos define el límite.` : ''; }
          },
          {
            cat: 'mercado', catLabel: 'Distribución de Mercado', titulo: 'Dominancia de Materiales',
            tipo: 'dona', met: 'Granito (Cuota)', labels: ['Granito', 'Cuarzo / Sinterizados'],
            insight: () => { const m = M('Granito (Cuota)'); return m ? `El granito captura el <strong>${fmt(m.Valor_Maximo, 1)}%</strong>. El resto está siendo devorado por superficies tecnológicas.` : ''; }
          },
          {
            cat: 'operativo', catLabel: 'Control Operativo', titulo: 'Punto Crítico de Maquinaria',
            tipo: 'zona', met: 'Utilización de Maquinaria (Equilibrio)',
            insight: () => { const u = M('Utilización de Maquinaria (Equilibrio)'); return u ? `El CNC debe operar al <strong>${fmt(u.Valor_Minimo)}%</strong> solo para cubrir costos. Tiempos muertos equivalen a pérdidas líquidas.` : ''; }
          }
        ]
      },
      'Gastronomía': {
        emoji: '🍔',
        veredicto: {
          titulo: 'Márgenes de milímetros',
          texto: () => `Mueve <strong>US$ 1 billón</strong> en EEUU, pero de cada $100 vendidos, quedan entre $3 y $9 de ganancia. Gana el que mejor controla sus costos, no el que más vende.`,
          senales: ['✅ Demanda perpetua', '⚠️ Márgenes netos <10%', '⚠️ Alta mortandad', '💡 Costo Primo crítico']
        },
        kpis: [
          { met: 'Restaurantes Rentables (EEUU)', label: 'Rentabilidad', unidad: '% Negocios', dec: 0, ctx: 'Solo el 42% sobrevivió en verde.' },
          { met: 'Margen Neto Comida Rápida', label: 'Fast Food', unidad: '% Margen Neto', dec: 0, ctx: 'El formato más rentable del sector.' },
          { met: 'Margen Neto Restaurante Servicio Completo', label: 'Full Service', unidad: '% Margen Neto', dec: 0, ctx: 'Altos costos operativos hunden el margen.' }
        ],
        graficos: [
          {
            cat: 'financiero', catLabel: 'Estructura de Costos', titulo: 'Límites del Costo Primo',
            tipo: 'compare', items: () => { const a = M('Costo de Alimentos'), l = M('Costo Laboral'), p = M('Costo Primo (Alimentos + Personal)'); if(!a||!l||!p) return null; return [{label:'Alimentos', valor:a.Valor_Maximo, color:'#1A1A1A'}, {label:'Personal', valor:l.Valor_Maximo, color:'#D4AF37'}, {label:'Costo Primo Máx', valor:p.Valor_Maximo, color:'#046307'}]; }, formato: 'pct',
            insight: () => `Ingredientes + personal no deben superar el <strong>65%</strong> de la venta. Más allá, se trabaja a pérdida.`
          },
          {
            cat: 'operativo', catLabel: 'Estado del Mercado', titulo: 'Tasa de Sobrevivencia',
            tipo: 'dona', met: 'Restaurantes Rentables (EEUU)', labels: ['Rentables', 'En pérdida'],
            insight: () => `El <strong>58%</strong> de los restaurantes operó en pérdida en 2024. El control de inventario es la única defensa.`
          }
        ]
      },
      'Hotelería': {
        emoji: '🏨',
        veredicto: {
          titulo: 'El negocio de la demanda',
          texto: () => `Mercado de <strong>US$ 4.9 billones</strong> donde la habitación vacía es pérdida pura. La clave está en la venta directa para evadir el peaje de los intermediarios.`,
          senales: ['✅ Turismo al alza', '⚠️ 36% capacidad ociosa', '⚠️ Peaje OTAs (25%)', '💡 Venta directa es ley']
        },
        kpis: [
          { met: 'Ocupación Promedio (EEUU)', label: 'Ocupación', unidad: '% Promedio', dec: 1, ctx: 'Habitaciones ocupadas por noche.' },
          { met: 'Tarifa Diaria Promedio (ADR)', label: 'ADR', unidad: 'USD/Noche', dec: 0, ctx: 'Tarifa promedio de venta.' },
          { met: 'Margen Operativo Bruto (GOP)', label: 'Margen GOP', unidad: '%', dec: 1, ctx: 'Ganancia tras operación directa.' }
        ],
        graficos: [
          {
            cat: 'operativo', catLabel: 'Intermediación', titulo: 'Costo de Adquisición',
            tipo: 'compare', items: () => { const o = M('Comisión de Intermediarios (OTAs)'), d = M('Costo de Venta Directa (Web Propia)'); if(!o||!d) return null; return [{label:'OTA (Booking)', valor:o.Valor_Maximo, color:'#1A1A1A'}, {label:'Web Directa', valor:d.Valor_Maximo, color:'#046307'}]; }, formato: 'pct',
            insight: () => `Booking y Expedia devoran hasta el <strong>25%</strong> del ingreso. Posicionamiento propio equivale a margen neto.`
          },
          {
            cat: 'financiero', catLabel: 'Rendimiento', titulo: 'Composición de Ingresos',
            tipo: 'dona', met: 'Margen Operativo Bruto (GOP)', labels: ['Ganancia Operativa', 'Costos Operativos'],
            insight: () => `El <strong>61.5%</strong> se consume en operación. Ajustar tarifas dinámicamente protege el 38.5% restante.`
          }
        ]
      },
      'Medicina': {
        emoji: '🏥',
        veredicto: {
          titulo: 'Sangrado por la silla vacía',
          texto: () => `Negocio de altos ingresos donde el mayor enemigo no es el costo, sino el paciente ausente. Las inasistencias cuestan miles de dólares mensuales irrecuperables.`,

          { met: 'Pérdida Mensual por Inasistencias', label: 'Fuga Mensual', unidad: 'USD/Mes', dec: 0, ctx: 'Dinero perdido por tiempos muertos.' }
        ],
        graficos: [
          {
            cat: 'financiero', catLabel: 'Rentabilidad', titulo: 'Medicina General vs Dental',
            tipo: 'minmax', mets: ['Margen EBITDA Consultorio Médico', 'Margen Neto Clínica Dental'], labels: ['Medicina General', 'Dental'],
            insight: () => `Odontología duplica márgenes (<strong>40%</strong> vs 20%) gracias a cobros directos y menor dependencia de aseguradoras.`
          },
          {

            insight: () => `Los mejores cobran el <strong>99%</strong>. Consultorios promedio pierden un 10% en disputas con seguros y pacientes.`
          }
        ]
      },
      'Joyería': {
        emoji: '💍',
        veredicto: {
          titulo: 'Lujo con capital inmovilizado',
          texto: () => `Márgenes espectaculares del 60%, castigados por un inventario que rota una sola vez al año. El dinero duerme en las vitrinas de cristal.`,
          senales: ['✅ Márgenes de 60%', '✅ Ticket altísimo', '⚠️ Rotación anual 1x', '💡 Data de tendencias vital']
        },
        kpis: [
          { met: 'Tamaño del Mercado', label: 'Mercado', unidad: 'Billones USD', dec: 1, ctx: 'Mercado resiliente a crisis.' },
          { met: 'Margen Bruto Joyería Fina', label: 'Margen Bruto', unidad: '% Max', dec: 0, ctx: 'Markup excepcional de industria.' },
          { met: 'Rotación de Inventario Anual', label: 'Rotación', unidad: 'Veces/Año', dec: 1, ctx: 'Velocidad de venta del stock.' }
        ],
        graficos: [
          {
            cat: 'mercado', catLabel: 'Distribución', titulo: 'Canales de Venta',
            tipo: 'dona', met: 'Venta en Tienda Física (Cuota)', labels: ['Física', 'Online'],
            insight: () => `La tienda física retiene el <strong>83.9%</strong> por la necesidad de confianza, pero el e-commerce absorbe el crecimiento nuevo.`
          },
          {
            cat: 'operativo', catLabel: 'Eficiencia', titulo: 'El problema del Stock',
            tipo: 'minmax', mets: ['Rotación de Inventario Anual'], labels: ['Rotación Anual'],
            insight: () => `Con una rotación de <strong>1.5x</strong>, optimizar el mix de productos mediante analítica previene quiebres de caja.`
          }
        ]
      },
      'Inmobiliaria': {
        emoji: '🏠',
        veredicto: {
          titulo: 'El imperio de la velocidad',
          texto: () => `Comisiones masivas en un mercado de US$ 4 billones, donde la diferencia entre cerrar y perder está en responder en los primeros 5 minutos.`,
          senales: ['✅ Comisiones altas', '✅ Mercado masivo', '⚠️ Conversión general baja (1%)', '💡 Velocidad de respuesta lo es todo']
        },
        kpis: [
          { met: 'Comisión de Venta Típica', label: 'Comisión', unidad: '% por Cierre', dec: 0, ctx: 'Retorno directo por transacción.' },
          { met: 'Costo por Prospecto (Lead)', label: 'Costo Lead', unidad: 'USD', dec: 0, ctx: 'Costo publicitario por interesado.' },
          { met: 'Conversión de Prospectos (Agente Promedio)', label: 'Cierre', unidad: '% Conversión', dec: 1, ctx: 'Eficiencia del embudo de ventas.' }
        ],
        graficos: [
          {
            cat: 'operativo', catLabel: 'Comportamiento', titulo: 'Regla del Primer Contacto',
            tipo: 'dona', met: 'Clientes que Eligen al Primero que Responde', labels: ['Primer Agente', 'Otros'],
            insight: () => `El <strong>78%</strong> de clientes se queda con quien contesta primero. La automatización de leads multiplica ingresos.`
          },
          {
            cat: 'financiero', catLabel: 'Desempeño', titulo: 'Agente Promedio vs Élite',
            tipo: 'compare', items: () => { const p = M('Conversión de Prospectos (Agente Promedio)'), e = M('Conversión de Prospectos (Agente Élite)'); if(!p||!e) return null; return [{label:'Promedio', valor:p.Valor_Maximo, color:'#1A1A1A'}, {label:'Élite', valor:e.Valor_Maximo, color:'#046307'}]; }, formato: 'pct',
            insight: () => `Un CRM robusto eleva la conversión del <strong>1.2% al 9%</strong> con el mismo presupuesto publicitario.`
          }
        ]
      }
    };

    // =========================================================
    //   MOTOR DE RENDERIZADO ASÍNCRONO
    // =========================================================

    async function cargarDashboard() {
      document.getElementById('errorBox').classList.remove('visible');
      timerAviso = setTimeout(() => document.getElementById('avisoEspera').classList.add('visible'), 6000);

      try {
        const respuesta = await fetch(URL_BACKEND);
        if (!respuesta.ok) throw new Error(`Error HTTP: ${respuesta.status}`);
        datosGlobales = await respuesta.json();
        
        clearTimeout(timerAviso);
        document.getElementById('avisoEspera').classList.remove('visible');

        Chart.defaults.font.family = 'Inter'; Chart.defaults.color = '#52525B';
        construirSelector();
        await renderizarIndustriaCore(Object.keys(agruparIndustrias())[0]);

      } catch (error) {
        clearTimeout(timerAviso); document.getElementById('avisoEspera').classList.remove('visible');
        document.getElementById('errorDetalle').textContent = error.message;
        document.getElementById('errorBox').classList.add('visible');
      }
    }

    function agruparIndustrias() { const g = {}; datosGlobales.forEach(d => g[d['Industria'] ?? 'Piedra y Superficies'] = true); return g; }

    function construirSelector() {
      const cont = document.getElementById('selectorIndustria');
      Object.keys(agruparIndustrias()).forEach(ind => {
        const btn = document.createElement('button');
        btn.className = 'ind-chip';
        btn.innerHTML = `<span class="emoji">${CONFIG[ind]?.emoji ?? '📊'}</span>${ind}`;
        btn.onclick = () => renderizarIndustria(ind);
        btn.dataset.ind = ind;
        cont.appendChild(btn);
      });
    }

    async function renderizarIndustria(industria) {
      if(industriaActiva === industria) return;
      const c = document.getElementById('contenido');
      c.classList.add('oculto');
      await new Promise(r => setTimeout(r, 300));
      await renderizarIndustriaCore(industria);
      requestAnimationFrame(() => c.classList.remove('oculto'));
    }

    async function renderizarIndustriaCore(industria) {
      industriaActiva = industria;
      document.querySelectorAll('.ind-chip').forEach(b => b.classList.toggle('activo', b.dataset.ind === industria));
      document.getElementById('tituloIndustria').textContent = industria;
      charts.forEach(c => c.destroy()); charts = [];

      const cfg = CONFIG[industria];
      const c = document.getElementById('contenido');
      if (!cfg) return;

      const categorias = [...new Set(cfg.graficos.map(g => g.cat))];
      const nombresCat = { financiero: '💰 Financiero', mercado: '🌍 Mercado', operativo: '⚙️ Operativo' };

      // Layout Grid (Veredicto Izq + KPIs Der) + Animaciones Shadcn Staggered
      c.innerHTML = `
        <div class="grid-superior">
          <div class="veredicto anim-blur-fade d-1">
            <div>
              <h2>${cfg.veredicto.titulo}</h2>
              <p>${cfg.veredicto.texto()}</p>
            </div>
            <div class="senales">${cfg.veredicto.senales.map(s => `<span class="senal">${s}</span>`).join('')}</div>
          </div>

          <div class="grid-kpis">
            ${cfg.kpis.map((k, i) => `
              <div class="card anim-blur-fade d-2">
                <div class="card-header">
                  <h3>${k.label}</h3>
                </div>
                <div>
                  <div class="valor"><span id="kpi${i}"></span><span class="unidad">${k.unidad}</span></div>
                  <p class="contexto">${k.ctx}</p>
                </div>
              </div>`).join('')}
          </div>
        </div>

        <div class="filtros anim-blur-fade d-3" id="filtros">
          <button class="chip activo" data-cat="todos">Ver todo</button>
          ${categorias.map(cat => `<button class="chip" data-cat="${cat}">${nombresCat[cat] ?? cat}</button>`).join('')}
        </div>

        <div class="graficos">
          ${cfg.graficos.map((g, i) => `
            <div class="panel anim-blur-fade d-4" data-cat="${g.cat}" id="panel${i}">
              <div class="panel-header">
                <h3>${g.titulo}</h3>
                <p class="cat-tag">${g.catLabel}</p>
              </div>
              <canvas id="ch${i}"></canvas>
              <div class="insight">
                ${g.insight()}
              </div>
            </div>`).join('')}
        </div>
      `;

      cfg.kpis.forEach((k, i) => {
        const el = document.getElementById(`kpi${i}`), m = M(k.met);
        if (m && el) animarValor(el, m.Valor_Maximo, k.dec);
      });

      cfg.graficos.forEach((g, i) => {
        const chart = construirGrafico(g, document.getElementById(`ch${i}`));
        if (chart) charts.push(chart); else document.getElementById(`panel${i}`)?.classList.add('oculto');
      });

      // Filtros
      const chips = document.querySelectorAll('#filtros .chip'), paneles = document.querySelectorAll('.panel');
      chips.forEach(chip => chip.onclick = () => {
        chips.forEach(c => c.classList.remove('activo')); chip.classList.add('activo');
        paneles.forEach(p => p.classList.toggle('oculto', chip.dataset.cat !== 'todos' && p.dataset.cat !== chip.dataset.cat));
      });
    }

    function construirGrafico(g, canvas) {
      const opts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 6, font: {family: 'Inter', size: 12} } }, tooltip: tooltipBase } };
      
      if (g.tipo === 'minmax') {
        const mets = g.mets.map(n => M(n)); if (mets.some(m => !m)) return null;
        return new Chart(canvas, { type: 'bar', data: { labels: g.labels, datasets: [{ label: 'Mínimo', data: mets.map(m => m.Valor_Minimo), backgroundColor: '#09090B', borderRadius: 6 }, { label: 'Máximo', data: mets.map(m => m.Valor_Maximo), backgroundColor: '#046307', borderRadius: 6 }] }, options: { ...opts, scales: { y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, border: {display: false} }, x: { grid: { display: false }, border: {display: false} } } } });
      }
      if (g.tipo === 'dona') {
        const m = M(g.met); if (!m) return null;
        return new Chart(canvas, { type: 'doughnut', data: { labels: g.labels, datasets: [{ data: [m.Valor_Maximo, Math.max(0, 100 - m.Valor_Maximo)], backgroundColor: ['#D4AF37', '#09090B'], borderWidth: 0, hoverOffset: 8 }] }, options: { ...opts, cutout: '75%' } });
      }
      if (g.tipo === 'compare') {
        const items = g.items(); if (!items) return null;
        return new Chart(canvas, { type: 'bar', data: { labels: items.map(it => it.label), datasets: [{ data: items.map(it => it.valor), backgroundColor: items.map(it => it.color), borderRadius: 6 }] }, options: { ...opts, indexAxis: 'y', plugins: { ...opts.plugins, legend: { display: false } }, scales: { x: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, border: {display: false} }, y: { grid: { display: false }, border: {display: false} } } } });
      }
      if (g.tipo === 'zona') {
        const m = M(g.met); if (!m) return null;
        return new Chart(canvas, { type: 'bar', data: { labels: ['Uso CNC'], datasets: [{ label: `Riesgo (0–${fmt(m.Valor_Minimo)}%)`, data: [m.Valor_Minimo], backgroundColor: '#EF4444', borderRadius: { topLeft: 6, bottomLeft: 6 } }, { label: `Ganancia (${fmt(m.Valor_Minimo)}–${fmt(m.Valor_Maximo)}%)`, data: [m.Valor_Maximo - m.Valor_Minimo], backgroundColor: '#046307', borderRadius: { topRight: 6, bottomRight: 6 } }] }, options: { ...opts, indexAxis: 'y', scales: { x: { stacked: true, max: 100, grid: { color: 'rgba(0,0,0,0.05)' }, border: {display: false} }, y: { stacked: true, grid: { display: false }, border: {display: false} } } } });
      }
      return null;
    }

    function animarValor(el, valor, dec = 0) {
      const start = performance.now();
      requestAnimationFrame(function paso(ahora) {
        const p = Math.min((ahora - start) / 1000, 1);
        el.textContent = fmt(valor * (1 - Math.pow(1 - p, 4)), dec);
        if (p < 1) requestAnimationFrame(paso);
      });
    }

    cargarDashboard();
  </script>
</body>
