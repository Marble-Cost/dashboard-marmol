<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Benchmarks de Industrias · Observatorio de Mercados</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --blanco-crema: #FDFBF7;
      --negro: #09090B;
      --dorado: #D4AF37;
      --verde-esmeralda: #046307;
      
      /* Glassmorphism Inmersivo */
      --vidrio-fondo: rgba(255, 255, 255, 0.65);
      --vidrio-desenfoque: blur(24px) saturate(180%);
      --vidrio-borde: rgba(255, 255, 255, 0.9);
      --vidrio-reflejo: inset 0 1px 1px rgba(255, 255, 255, 1), inset 0 0 20px rgba(255, 255, 255, 0.3);
      
      --sombra-suave: 0 8px 32px rgba(26, 26, 26, 0.05);
      --sombra-elevada: 0 20px 25px -5px rgba(4, 99, 7, 0.15), 0 8px 10px -6px rgba(4, 99, 7, 0.1);
      
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      --transicion: 0.4s var(--ease-out-quart);
    }

    * { box-sizing: border-box; }

    body {
      background-color: var(--blanco-crema);
      color: var(--negro);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: clamp(16px, 3vw, 40px);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== Luz de Cursor Inmersiva ===== */
    .cursor-glow {
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 50%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: opacity 0.4s ease;
      opacity: 0;
      mix-blend-mode: soft-light;
    }

    /* ===== Layout Central Optimizado (Sin espacios muertos) ===== */
    .layout-central {
      max-width: 1450px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ===== Fondo Dinámico 3D ===== */
    .fondo-animado { position: fixed; inset: 0; z-index: -1; background: var(--blanco-crema); overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.35; animation: flotar 20s infinite ease-in-out alternate; }
    .orb-1 { width: 45vw; height: 45vw; background: var(--dorado); top: -10%; left: -10%; }
    .orb-2 { width: 50vw; height: 50vw; background: var(--verde-esmeralda); bottom: -10%; right: -10%; animation-delay: -5s; }
    .orb-3 { width: 35vw; height: 35vw; background: #F3E5B0; top: 40%; left: 40%; animation-delay: -10s; opacity: 0.4; }
    @keyframes flotar { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, 60px) scale(1.15); } }
    
    body::before {
      content: ''; position: fixed; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--dorado) 0%, #F3E5B0 50%, var(--verde-esmeralda) 100%);
      z-index: 100; box-shadow: 0 2px 15px rgba(212, 175, 55, 0.4);
    }

    /* ===== Cabecera Flex ===== */
    .header-wrapper {
      display: flex; flex-direction: column; gap: 20px;
      margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .header-izq { flex: 1; }
    .header-der { display: flex; width: 100%; overflow: hidden; }
    
    .eyebrow {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--dorado); margin: 0 0 10px 0; display: inline-block;
      padding: 4px 12px; background: rgba(212, 175, 55, 0.08); border-radius: 12px;
      border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(10px);
    }
    h1 {
      font-family: 'Marcellus', serif; margin: 0; font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1; background: linear-gradient(135deg, var(--verde-esmeralda) 0%, #083b0a 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px;
    }
    .header-izq p { font-size: clamp(0.95rem, 2vw, 1.1rem); color: #52525B; margin: 8px 0 0 0; max-width: 550px; line-height: 1.5; }

    /* ===== Selectores (Animaciones táctiles) ===== */
    .selector-industria, .filtros {
      display: flex; gap: 10px; width: 100%; overflow-x: auto; padding-bottom: 8px; margin-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }
    @media (max-width: 768px) { .selector-industria::-webkit-scrollbar, .filtros::-webkit-scrollbar { display: none; } }
    
    .ind-chip, .chip {
      flex: 0 0 auto; display: flex; align-items: center; gap: 8px;
      background: var(--vidrio-fondo); -webkit-backdrop-filter: var(--vidrio-desenfoque); backdrop-filter: var(--vidrio-desenfoque);
      border: 1px solid var(--vidrio-borde); border-radius: 14px;
      font-family: 'Inter', sans-serif; font-weight: 500; color: #3F3F46; cursor: pointer;
      transition: all var(--transicion); box-shadow: var(--sombra-suave);
    }
    .ind-chip { padding: 12px 20px; font-size: 0.95rem; }
    .chip { padding: 8px 18px; font-size: 0.85rem; }
    
    .ind-chip:hover, .chip:hover { transform: translateY(-3px); border-color: var(--dorado); background: rgba(255, 255, 255, 0.9); box-shadow: 0 8px 20px rgba(212, 175, 55, 0.15), var(--vidrio-reflejo); }
    .ind-chip:active, .chip:active { transform: scale(0.95); }
    .ind-chip.activo { background: linear-gradient(135deg, rgba(6, 61, 8, 0.95), rgba(4, 99, 7, 0.85)); border-color: rgba(243, 229, 176, 0.6); color: white; box-shadow: 0 10px 25px rgba(4, 99, 7, 0.4), inset 0 1px 1px rgba(255,255,255,0.2); font-weight: 600; }
    .chip.activo { background: var(--verde-esmeralda); border-color: var(--verde-esmeralda); color: white; box-shadow: 0 6px 15px rgba(4, 99, 7, 0.3); font-weight: 600; }

    @media (min-width: 1024px) {
      .header-wrapper { flex-direction: row; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; }
      .header-der { width: auto; justify-content: flex-end; }
      .selector-industria { padding-bottom: 0; margin-bottom: 0; }
      .filtros { margin-bottom: 24px; padding-bottom: 4px; }
    }

    /* ===== Transiciones Asíncronas y Respiro al Scroll ===== */
    .transicion-contenido { transition: opacity 0.3s ease, transform 0.3s var(--ease-out-quart); opacity: 1; transform: translateY(0); width: 100%; }
    .transicion-contenido.oculto { opacity: 0; transform: translateY(15px); pointer-events: none; }

    .scroll-respiro { opacity: 0; filter: blur(8px); transform: translateY(25px) scale(0.98); transition: opacity 0.7s ease, filter 0.7s ease, transform 0.7s var(--ease-out-quart); will-change: opacity, transform, filter; }
    .scroll-respiro.visible { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); }

    /* ===== Layout Grid Asimétrico (Veredicto + KPIs) ===== */
    .grid-superior { display: flex; flex-direction: column; gap: 20px; margin-bottom: 24px; }
    @media (min-width: 1024px) { .grid-superior { display: grid; grid-template-columns: 1.2fr 2fr; gap: 24px; margin-bottom: 32px; } }

    /* Veredicto de Cristal */
    .veredicto {
      background: linear-gradient(135deg, rgba(6, 61, 8, 0.85) 0%, rgba(4, 99, 7, 0.75) 100%);
      -webkit-backdrop-filter: var(--vidrio-desenfoque); backdrop-filter: var(--vidrio-desenfoque);
      border: 1px solid rgba(243, 229, 176, 0.4); color: white; border-radius: 24px;
      padding: clamp(24px, 4vw, 36px); box-shadow: 0 16px 40px rgba(4, 99, 7, 0.25), inset 0 1px 1px rgba(255,255,255,0.2);
      display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden;
    }
    .veredicto::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); transform: skewX(-25deg); animation: reflejo 6s infinite; }
    @keyframes reflejo { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
    .veredicto h2 { font-family: 'Marcellus', serif; font-size: clamp(1.4rem, 3vw, 1.7rem); margin: 0 0 16px 0; color: #F3E5B0; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
    .veredicto p { margin: 0 0 24px 0; font-size: clamp(0.95rem, 2vw, 1.05rem); line-height: 1.6; color: rgba(255,255,255,0.95); }
    .senales { display: flex; flex-wrap: wrap; gap: 8px; }
    .senal { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 30px; padding: 6px 16px; font-size: 0.85rem; font-weight: 500; transition: all var(--transicion); }
    .senal:hover { background: rgba(255,255,255,0.2); border-color: rgba(243, 229, 176, 0.6); transform: translateY(-2px); }

    /* KPIs Inmersivos */
    .grid-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    @media (min-width: 1024px) { .grid-kpis { gap: 20px; } }
    .card {
      background: var(--vidrio-fondo); -webkit-backdrop-filter: var(--vidrio-desenfoque); backdrop-filter: var(--vidrio-desenfoque);
      border: 1px solid var(--vidrio-borde); border-left: 5px solid var(--dorado); padding: clamp(20px, 3vw, 28px); border-radius: 20px;
      box-shadow: var(--sombra-suave), var(--vidrio-reflejo); transition: all var(--transicion);
      display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden;
    }
    .card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at top right, rgba(212,175,55,0.15), transparent 60%); opacity: 0; transition: opacity var(--transicion); }
    .card:hover { transform: translateY(-6px) scale(1.01); box-shadow: var(--sombra-elevada), inset 0 1px 2px rgba(255,255,255,1); border-color: rgba(212, 175, 55, 0.5); }
    .card:hover::after { opacity: 1; }
    .card h3 { color: var(--verde-esmeralda); margin: 0 0 12px 0; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; position: relative; z-index: 2; }
    .valor { font-size: clamp(2rem, 4vw, 2.5rem); font-weight: 700; color: var(--negro); letter-spacing: -1px; line-height: 1; margin-bottom: 8px; position: relative; z-index: 2; }
    .valor .unidad { font-size: 0.4em; font-weight: 600; color: #71717A; margin-left: 4px; text-transform: uppercase; }
    .contexto { font-size: 0.85rem; color: #52525B; line-height: 1.4; margin: 0; position: relative; z-index: 2; }

    /* ===== Gráficos ===== */
    .graficos { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media (min-width: 768px) { .graficos { grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 28px; } }
    .panel {
      position: relative; background: var(--vidrio-fondo); -webkit-backdrop-filter: var(--vidrio-desenfoque); backdrop-filter: var(--vidrio-desenfoque);
      border: 1px solid var(--vidrio-borde); border-top: 5px solid var(--verde-esmeralda); padding: clamp(20px, 4vw, 32px); border-radius: 24px;
      box-shadow: var(--sombra-suave), var(--vidrio-reflejo); transition: all var(--transicion);
      display: flex; flex-direction: column; width: 100%; overflow: hidden;
    }
    .panel::before { content: ''; position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: radial-gradient(circle, rgba(212, 175, 55, 0.15), transparent 70%); pointer-events: none; }
    .panel:hover { transform: translateY(-6px); box-shadow: var(--sombra-elevada), inset 0 1px 2px rgba(255,255,255,1); }
    .panel.oculto { display: none; }
    
    .panel-header { margin-bottom: 16px; }
    .panel h3 { font-family: 'Marcellus', serif; font-size: clamp(1.2rem, 3vw, 1.4rem); margin: 0 0 6px 0; color: var(--negro); }
    .cat-tag { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dorado); margin: 0; }
    
    .canvas-container { position: relative; width: 100%; height: 280px; margin-bottom: 24px; margin-top: auto; }
    .panel canvas { width: 100% !important; height: 100% !important; }

    .insight {
      background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.25); border-left: 4px solid var(--dorado);
      border-radius: 12px; padding: 18px 22px; font-size: 0.92rem; line-height: 1.6; color: #3F3F46;
      margin-top: auto; box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
    }
    .insight strong { color: var(--verde-esmeralda); font-weight: 700; }
    .insight .titulo-insight { display: block; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dorado); margin-bottom: 8px; }

    /* ===== Esqueletos de Carga ===== */
    .skeleton { background: rgba(255,255,255,0.5); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); border: 1px solid var(--vidrio-borde); border-radius: 20px; position: relative; overflow: hidden; }
    .skeleton::after { content: ''; position: absolute; inset: 0; transform: translateX(-100%); background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent); animation: brillo 1.5s infinite; }
    @keyframes brillo { 100% { transform: translateX(100%); } }

    .aviso-espera { display: none; padding: 16px; background: rgba(212, 175, 55, 0.15); border: 1px solid rgba(212, 175, 55, 0.5); border-radius: 16px; font-size: 0.95rem; font-weight: 500; text-align: center; margin-bottom: 24px; }
    .aviso-espera.visible { display: block; }
    .error-box { display: none; background: white; border: 1px solid #E4E4E7; border-left: 5px solid #B3261E; border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: var(--sombra-elevada); }
    .error-box.visible { display: block; }
  </style>
</head>
<body>

  <!-- Luz Inmersiva Restaurada -->
  <div class="cursor-glow" id="cursorGlow"></div>
  
  <div class="fondo-animado"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

  <main class="layout-central">
    
    <div class="header-wrapper">
      <div class="header-izq scroll-respiro">
        <span class="eyebrow">Business Intelligence</span>
        <h1 id="tituloIndustria">Benchmarks de Industrias</h1>
        <p>Análisis de rentabilidad y viabilidad operativa.</p>
      </div>
      <div class="header-der scroll-respiro" style="transition-delay: 0.1s">
        <nav class="selector-industria" id="selectorIndustria"></nav>
      </div>
    </div>

    <div class="aviso-espera" id="avisoEspera">⏳ Conectando al motor de datos... (puede tardar unos segundos)</div>
    <div class="error-box" id="errorBox">
      <h3 style="margin: 0 0 10px 0; color: #B3261E; font-size: 1.1rem;">Error de conexión</h3>
      <p id="errorDetalle" style="margin: 0 0 20px 0; font-size: 0.95rem;"></p>
      <button onclick="cargarDashboard()" style="background: var(--verde-esmeralda); color: white; border: none; padding: 12px 28px; border-radius: 12px; font-weight: 600; cursor: pointer;">Reintentar</button>
    </div>

    <div id="contenido" class="transicion-contenido">
      <div class="grid-superior">
        <div class="skeleton" style="height: 300px;"></div>
        <div class="grid-kpis">
          <div class="skeleton" style="height: 160px;"></div><div class="skeleton"></div><div class="skeleton"></div>
        </div>
      </div>
      <div class="graficos">
        <div class="skeleton" style="height: 400px;"></div><div class="skeleton"></div>
      </div>
    </div>

  </main>

  <script>
    const URL_BACKEND = "https://dashboard-marmol.onrender.com/api/benchmarks";
    let timerAviso = null, charts = [], datosGlobales = [], industriaActiva = null;

    // --- Cursor Inmersivo Desatado ---
    const cursor = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', (e) => {
      cursor.style.opacity = '1';
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
    document.addEventListener('mouseleave', () => cursor.style.opacity = '0');

    // --- Motor de Respiración en Scroll (Ciclo continuo) ---
    function iniciarRespiracionScroll() {
      const observer = new IntersectionObserver((entradas) => {
        entradas.forEach(entrada => {
          if (entrada.isIntersecting) {
            entrada.target.classList.add('visible');
          } else {
            // Elimina la clase al salir del viewport para que respire al volver a bajar/subir
            entrada.target.classList.remove('visible');
          }
        });
      }, { threshold: 0.05, rootMargin: "0px 0px -20px 0px" });
      
      document.querySelectorAll('.scroll-respiro').forEach(el => observer.observe(el));
    }

    // --- Utilidades ---
    const fmt = (n, dec = 0) => Number(n).toLocaleString('es-CO', { minimumFractionDigits: dec, maximumFractionDigits: dec });
    const M = (nombre) => datosGlobales.find(d => (d['Industria'] ?? 'Piedra y Superficies') === industriaActiva && d['Métrica'] === nombre) ?? null;
    const tooltipBase = { backgroundColor: 'rgba(9, 9, 11, 0.95)', padding: 14, cornerRadius: 10, titleFont: {family: 'Inter', size: 14, weight: '600'}, bodyFont: {family: 'Inter', size: 13} };

    // =========================================================
    //   CONFIGURACIÓN EDITORIAL
    // =========================================================
    const CONFIG = {
      'Piedra y Superficies': {
        emoji: '🪨',
        veredicto: {
          titulo: 'Atractivo, pero exigente',
          texto: () => `Mercado de <strong>US$ ${M('Tamaño del Mercado') ? fmt(M('Tamaño del Mercado').Valor_Maximo, 1) : '—'}B</strong> que crece <strong>${M('Crecimiento (CAGR)') ? fmt(M('Crecimiento (CAGR)').Valor_Maximo, 1) : '—'}% al año</strong>. Altamente lucrativo, pero la barrera de inversión inicial y la eficiencia operativa son implacables.`,
          senales: ['✅ Alta demanda', '✅ Márgenes fuertes', '⚠️ CapEx elevado', '⚠️ Eficiencia CNC']
        },
        kpis: [
          { met: 'Tamaño del Mercado', label: 'Mercado Total', unidad: 'B USD', dec: 1, ctx: 'Ventas anuales.' },
          { met: 'Margen Bruto', label: 'Margen Bruto', unidad: '% Max', dec: 0, ctx: 'Ganancia base.' },
          { met: 'Overhead por SqFt', label: 'Overhead', unidad: 'USD/SqFt', dec: 0, ctx: 'Costo fijo/área.' }
        ],
        graficos: [
          {
            cat: 'financiero', catLabel: 'Métricas Financieras', titulo: 'Rendimiento de Facturación',
            tipo: 'minmax', mets: ['Ingreso Anual Promedio'], labels: ['Facturación (USD)'],
            insight: () => { const m = M('Ingreso Anual Promedio'); return m ? `Un taller promedio factura entre <strong>US$ ${fmt(m.Valor_Minimo)}</strong> y <strong>US$ ${fmt(m.Valor_Maximo)}</strong>. La gestión de datos define el límite.` : ''; }
          },
          {
            cat: 'mercado', catLabel: 'Distribución de Mercado', titulo: 'Dominancia de Materiales',
            tipo: 'dona', met: 'Granito (Cuota)', labels: ['Granito', 'Sinterizados'],
            insight: () => { const m = M('Granito (Cuota)'); return m ? `El granito captura el <strong>${fmt(m.Valor_Maximo, 1)}%</strong>. El resto está siendo devorado por superficies tecnológicas.` : ''; }
          },
          {
            cat: 'operativo', catLabel: 'Control Operativo', titulo: 'Punto Crítico de Maquinaria',
            tipo: 'zona', met: 'Utilización de Maquinaria (Equilibrio)',
            insight: () => { const u = M('Utilización de Maquinaria (Equilibrio)'); return u ? `El CNC debe operar al <strong>${fmt(u.Valor_Minimo)}%</strong> solo para cubrir costos. Tiempos muertos son pérdidas.` : ''; }
          }
        ]
      },
      'Gastronomía': {
        emoji: '🍔',
        veredicto: {
          titulo: 'Márgenes de milímetros',
          texto: () => `Mueve <strong>US$ 1 billón</strong> en EEUU, pero quedan entre $3 y $9 de ganancia por cada $100. Gana el que mejor controla sus costos, no el que más vende.`,
          senales: ['✅ Demanda perpetua', '⚠️ Márgenes <10%', '⚠️ Alta mortandad', '💡 Control de costos']
        },
        kpis: [
          { met: 'Restaurantes Rentables (EEUU)', label: 'Rentabilidad', unidad: '% Negocios', dec: 0, ctx: 'Sobrevivieron en verde.' },
          { met: 'Margen Neto Comida Rápida', label: 'Fast Food', unidad: '% Neto', dec: 0, ctx: 'Formato más rentable.' },
          { met: 'Margen Neto Restaurante Servicio Completo', label: 'Full Service', unidad: '% Neto', dec: 0, ctx: 'Menor rentabilidad.' }
        ],
        graficos: [
          {
            cat: 'financiero', catLabel: 'Estructura de Costos', titulo: 'Límites del Costo Primo',
            tipo: 'compare', items: () => { const a = M('Costo de Alimentos'), l = M('Costo Laboral'), p = M('Costo Primo (Alimentos + Personal)'); if(!a||!l||!p) return null; return [{label:'Alimentos', valor:a.Valor_Maximo, color:'#1A1A1A'}, {label:'Personal', valor:l.Valor_Maximo, color:'#D4AF37'}, {label:'Costo Primo', valor:p.Valor_Maximo, color:'#046307'}]; }, formato: 'pct',
            insight: () => `Ingredientes + personal no deben superar el <strong>65%</strong> de la venta. Más allá es pérdida.`
          },
          {
            cat: 'operativo', catLabel: 'Estado del Mercado', titulo: 'Tasa de Sobrevivencia',
            tipo: 'dona', met: 'Restaurantes Rentables (EEUU)', labels: ['Rentables', 'En pérdida'],
            insight: () => `El <strong>58%</strong> de restaurantes operó en pérdida en 2024. El inventario es la defensa.`
          }
        ]
      },
      'Hotelería': {
        emoji: '🏨',
        veredicto: {
          titulo: 'El negocio de la demanda',
          texto: () => `Mercado de <strong>US$ 4.9 billones</strong> donde la habitación vacía es pérdida pura. La clave está en la venta directa para evadir a los intermediarios.`,
          senales: ['✅ Turismo al alza', '⚠️ 36% capacidad ociosa', '⚠️ Peaje OTAs (25%)', '💡 Venta directa']
        },
        kpis: [

      },
      'Medicina': {

        ],
        graficos: [
          {

            tipo: 'minmax', mets: ['Margen EBITDA Consultorio Médico', 'Margen Neto Clínica Dental'], labels: ['Medicina General', 'Dental'],
            insight: () => `Odontología duplica márgenes (<strong>40%</strong> vs 20%) por cobros directos y menos seguros.`
          },
          {

            insight: () => `Los mejores cobran el <strong>99%</strong>. Promedios pierden 10% en disputas.`
          }
        ]
      },
      'Joyería': {
        emoji: '💍',
        veredicto: {

          texto: () => `Márgenes del 60%, castigados por un inventario que rota una sola vez al año. El dinero duerme en las vitrinas de cristal.`,
          senales: ['✅ Márgenes de 60%', '✅ Ticket alto', '⚠️ Rotación 1x', '💡 Data de tendencias']
        },
        kpis: [
          { met: 'Tamaño del Mercado', label: 'Mercado', unidad: 'B USD', dec: 1, ctx: 'Mercado resiliente.' },
          { met: 'Margen Bruto Joyería Fina', label: 'Margen Bruto', unidad: '% Max', dec: 0, ctx: 'Markup excepcional.' },
          { met: 'Rotación de Inventario Anual', label: 'Rotación', unidad: 'Veces/Año', dec: 1, ctx: 'Velocidad de venta.' }
        ],
        graficos: [
          {
            cat: 'mercado', catLabel: 'Distribución', titulo: 'Canales de Venta',
            tipo: 'dona', met: 'Venta en Tienda Física (Cuota)', labels: ['Física', 'Online'],
            insight: () => `La tienda física retiene el <strong>83.9%</strong>, pero el e-commerce absorbe el crecimiento.`
          },
          {
            cat: 'operativo', catLabel: 'Eficiencia', titulo: 'El problema del Stock',
            tipo: 'minmax', mets: ['Rotación de Inventario Anual'], labels: ['Rotación Anual'],
            insight: () => `Con rotación de <strong>1.5x</strong>, optimizar el mix previene quiebres de caja.`
          }
        ]
      },
      'Inmobiliaria': {
        emoji: '🏠',
        veredicto: {
          titulo: 'El imperio de la velocidad',
          texto: () => `Comisiones masivas, donde la diferencia entre cerrar y perder está en responder en los primeros 5 minutos.`,
          senales: ['✅ Comisiones altas', '✅ Mercado masivo', '⚠️ Baja conversión (1%)', '💡 Velocidad de respuesta']
        },
        kpis: [
          { met: 'Comisión de Venta Típica', label: 'Comisión', unidad: '% Cierre', dec: 0, ctx: 'Retorno por transacción.' },
          { met: 'Costo por Prospecto (Lead)', label: 'Costo Lead', unidad: 'USD', dec: 0, ctx: 'Costo publicitario.' },
          { met: 'Conversión de Prospectos (Agente Promedio)', label: 'Cierre', unidad: '% Convers.', dec: 1, ctx: 'Eficiencia del embudo.' }
        ],
        graficos: [
          {
            cat: 'operativo', catLabel: 'Comportamiento', titulo: 'Regla del Primer Contacto',
            tipo: 'dona', met: 'Clientes que Eligen al Primero que Responde', labels: ['Primer Agente', 'Otros'],
            insight: () => `El <strong>78%</strong> se queda con quien contesta primero. La automatización multiplica ingresos.`
          },
          {
            cat: 'financiero', catLabel: 'Desempeño', titulo: 'Agente Promedio vs Élite',
            tipo: 'compare', items: () => { const p = M('Conversión de Prospectos (Agente Promedio)'), e = M('Conversión de Prospectos (Agente Élite)'); if(!p||!e) return null; return [{label:'Promedio', valor:p.Valor_Maximo, color:'#1A1A1A'}, {label:'Élite', valor:e.Valor_Maximo, color:'#046307'}]; }, formato: 'pct',
            insight: () => `Un CRM robusto eleva la conversión del <strong>1.2% al 9%</strong> con el mismo presupuesto.`
          }
        ]
      }
    };

    // =========================================================
    //   MOTOR DE RENDERIZADO ASÍNCRONO
    // =========================================================

    async function cargarDashboard() {
      document.getElementById('errorBox').classList.remove('visible');
      timerAviso = setTimeout(() => document.getElementById('avisoEspera').classList.add('visible'), 6000);

      try {
        const respuesta = await fetch(URL_BACKEND);
        if (!respuesta.ok) throw new Error(`Error HTTP: ${respuesta.status}`);
        datosGlobales = await respuesta.json();
        
        clearTimeout(timerAviso); document.getElementById('avisoEspera').classList.remove('visible');
        Chart.defaults.font.family = 'Inter'; Chart.defaults.color = '#52525B';
        
        construirSelector();
        await renderizarIndustriaCore(Object.keys(agruparIndustrias())[0]);

      } catch (error) {
        clearTimeout(timerAviso); document.getElementById('avisoEspera').classList.remove('visible');
        document.getElementById('errorDetalle').textContent = error.message;
        document.getElementById('errorBox').classList.add('visible');
      }
    }

    function agruparIndustrias() { const g = {}; datosGlobales.forEach(d => g[d['Industria'] ?? 'Piedra y Superficies'] = true); return g; }

    function construirSelector() {
      const cont = document.getElementById('selectorIndustria');
      Object.keys(agruparIndustrias()).forEach(ind => {
        const btn = document.createElement('button'); btn.className = 'ind-chip';
        btn.innerHTML = `<span class="emoji">${CONFIG[ind]?.emoji ?? '📊'}</span>${ind}`;
        btn.onclick = () => renderizarIndustria(ind); btn.dataset.ind = ind;
        cont.appendChild(btn);
      });
    }

    async function renderizarIndustria(industria) {
      if(industriaActiva === industria) return;
      const c = document.getElementById('contenido'); c.classList.add('oculto');
      await new Promise(r => setTimeout(r, 300));
      await renderizarIndustriaCore(industria);
      requestAnimationFrame(() => c.classList.remove('oculto'));
    }

    async function renderizarIndustriaCore(industria) {
      industriaActiva = industria;
      document.querySelectorAll('.ind-chip').forEach(b => b.classList.toggle('activo', b.dataset.ind === industria));
      
      charts.forEach(c => c.destroy()); charts = [];
      const cfg = CONFIG[industria];
      const c = document.getElementById('contenido');
      
      if (!cfg) return;

      const categorias = [...new Set(cfg.graficos.map(g => g.cat))];
      const nombresCat = { financiero: '💰 Financiero', mercado: '🌍 Mercado', operativo: '⚙️ Operativo' };

      c.innerHTML = `
        <div class="grid-superior">
          <div class="veredicto scroll-respiro" style="transition-delay: 0.05s">
            <div><h2>${cfg.veredicto.titulo}</h2><p>${cfg.veredicto.texto()}</p></div>
            <div class="senales">${cfg.veredicto.senales.map(s => `<span class="senal">${s}</span>`).join('')}</div>
          </div>
          <div class="grid-kpis">
            ${cfg.kpis.map((k, i) => `
              <div class="card scroll-respiro" style="transition-delay: ${0.1 + (i*0.05)}s">
                <div class="card-header"><h3 style="color: var(--verde-esmeralda); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;">${k.label}</h3></div>
                <div><div class="valor"><span id="kpi${i}"></span><span class="unidad">${k.unidad}</span></div><p class="contexto">${k.ctx}</p></div>
              </div>`).join('')}
          </div>
        </div>

        <div class="filtros scroll-respiro" id="filtros" style="transition-delay: 0.25s">
          <button class="chip activo" data-cat="todos">Ver todo</button>
          ${categorias.map(cat => `<button class="chip" data-cat="${cat}">${nombresCat[cat] ?? cat}</button>`).join('')}
        </div>

        <div class="graficos">
          ${cfg.graficos.map((g, i) => `
            <div class="panel scroll-respiro" data-cat="${g.cat}" id="panel${i}" style="transition-delay: ${0.3 + (i*0.05)}s">
              <div class="panel-header"><h3>${g.titulo}</h3><p class="cat-tag">${g.catLabel}</p></div>
              <div class="canvas-container"><canvas id="ch${i}"></canvas></div>
              <div class="insight">
                <span class="titulo-insight">💡 ¿Qué significa esto?</span>
                ${g.insight()}
              </div>
            </div>`).join('')}
        </div>
      `;

      cfg.kpis.forEach((k, i) => {
        const el = document.getElementById(`kpi${i}`), m = M(k.met);
        if (m && el) animarValor(el, m.Valor_Maximo, k.dec);
      });

      setTimeout(() => {
        cfg.graficos.forEach((g, i) => {
          const chart = construirGrafico(g, document.getElementById(`ch${i}`));
          if (chart) charts.push(chart); else document.getElementById(`panel${i}`)?.classList.add('oculto');
        });
      }, 50);

      const chips = document.querySelectorAll('#filtros .chip'), paneles = document.querySelectorAll('.panel');
      chips.forEach(chip => chip.onclick = () => {
        chips.forEach(c => c.classList.remove('activo')); chip.classList.add('activo');
        paneles.forEach(p => {
          p.classList.toggle('oculto', chip.dataset.cat !== 'todos' && p.dataset.cat !== chip.dataset.cat);
          // Reiniciar animación al filtrar
          if(chip.dataset.cat !== 'todos' && p.dataset.cat === chip.dataset.cat) {
            p.classList.remove('visible');
            setTimeout(() => p.classList.add('visible'), 50);
          }
        });
      });
      
      // Llamar al observador para la nueva data renderizada
      iniciarRespiracionScroll();
      // Forzar la visualización inicial de los elementos que ya están en pantalla
      setTimeout(() => { document.querySelectorAll('.scroll-respiro').forEach(el => el.classList.add('visible')); }, 100);
    }

    function construirGrafico(g, canvas) {
      const opts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 6, font: {family: 'Inter', size: 12} } }, tooltip: tooltipBase } };
      
      if (g.tipo === 'minmax') {
        const mets = g.mets.map(n => M(n)); if (mets.some(m => !m)) return null;
        return new Chart(canvas, { type: 'bar', data: { labels: g.labels, datasets: [{ label: 'Mínimo', data: mets.map(m => m.Valor_Minimo), backgroundColor: '#09090B', borderRadius: 8 }, { label: 'Máximo', data: mets.map(m => m.Valor_Maximo), backgroundColor: '#046307', hoverBackgroundColor: '#D4AF37', borderRadius: 8 }] }, options: { ...opts, scales: { y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, border: {display: false} }, x: { grid: { display: false }, border: {display: false} } } } });
      }
      if (g.tipo === 'dona') {
        const m = M(g.met); if (!m) return null;
        return new Chart(canvas, { type: 'doughnut', data: { labels: g.labels, datasets: [{ data: [m.Valor_Maximo, Math.max(0, 100 - m.Valor_Maximo)], backgroundColor: ['#D4AF37', '#09090B'], borderWidth: 0, hoverOffset: 12 }] }, options: { ...opts, cutout: '75%' } });
      }
      if (g.tipo === 'compare') {
        const items = g.items(); if (!items) return null;
        return new Chart(canvas, { type: 'bar', data: { labels: items.map(it => it.label), datasets: [{ data: items.map(it => it.valor), backgroundColor: items.map(it => it.color), borderRadius: 8 }] }, options: { ...opts, indexAxis: 'y', plugins: { ...opts.plugins, legend: { display: false } }, scales: { x: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, border: {display: false} }, y: { grid: { display: false }, border: {display: false} } } } });
      }
      if (g.tipo === 'zona') {
        const m = M(g.met); if (!m) return null;
        return new Chart(canvas, { type: 'bar', data: { labels: ['Uso CNC'], datasets: [{ label: `Riesgo (0–${fmt(m.Valor_Minimo)}%)`, data: [m.Valor_Minimo], backgroundColor: '#EF4444', borderRadius: { topLeft: 8, bottomLeft: 8 } }, { label: `Ganancia (${fmt(m.Valor_Minimo)}–${fmt(m.Valor_Maximo)}%)`, data: [m.Valor_Maximo - m.Valor_Minimo], backgroundColor: '#046307', borderRadius: { topRight: 8, bottomRight: 8 } }] }, options: { ...opts, indexAxis: 'y', scales: { x: { stacked: true, max: 100, grid: { color: 'rgba(0,0,0,0.05)' }, border: {display: false} }, y: { stacked: true, grid: { display: false }, border: {display: false} } } } });
      }
      return null;
    }

    function animarValor(el, valor, dec = 0) {
      const start = performance.now();
      requestAnimationFrame(function paso(ahora) {
        const p = Math.min((ahora - start) / 1000, 1);
        el.textContent = fmt(valor * (1 - Math.pow(1 - p, 4)), dec);
        if (p < 1) requestAnimationFrame(paso);
      });
    }

    // Inicializar también los elementos del header al cargar
    iniciarRespiracionScroll();
    setTimeout(() => { document.querySelectorAll('.header-izq, .header-der').forEach(el => el.classList.add('visible')); }, 100);

    cargarDashboard();
  </script>
